pluginManagement {
    repositories {
        maven {
            url = uri("https://repo.kyngs.xyz/gradle-plugins")
        }
        gradlePluginPortal()
        // Cubizor fork: resolves the Tessera publish gradle plugin (io.tessera.minecraft.publish).
        maven {
            name = "Cubizor"
            url = uri("https://maven.pkg.github.com/Cubizor/*")
            credentials {
                username = providers.gradleProperty("gpr.user").orNull ?: System.getenv("GITHUB_ACTOR")
                password = providers.gradleProperty("gpr.key").orNull ?: System.getenv("PACKAGES_TOKEN")
            }
        }
    }
}

rootProject.name = 'LibreLogin'
include 'Plugin'
include 'API'